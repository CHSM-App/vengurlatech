name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Build frontend ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create frontend production env
        working-directory: frontend
        run: echo "VITE_API_URL=" > .env.production

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Assemble backend branch content ────────────────────────────────────
      # We push to a separate `backend` branch that contains:
      #   backend/          (Node app)
      #   backend/public/   (React build output)
      # Your server pulls from this branch to deploy.

      - name: Copy frontend build into backend/public
        run: |
          rm -rf backend/public
          cp -r frontend/dist backend/public

      - name: Deploy to backend branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: backend
          publish_dir: backend
          # Preserve full directory structure (no Jekyll, no dotfile filtering)
          enable_jekyll: false
          exclude_assets: ''
          force_orphan: false
          commit_message: "deploy: ${{ github.sha }}"
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
